<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Vege</title>
<style>
body {
  font-family: "Poppins", sans-serif;
  background: linear-gradient(135deg, #95d5b2, #52b788);
  display: flex; justify-content: center; align-items: center;
  height: 100vh; margin: 0;
}
.container {
  background: #fff; padding: 2rem 2.5rem; border-radius: 12px;
  box-shadow: 0 5px 25px rgba(0,0,0,0.1); width: 100%; max-width: 420px;
}
h2 { text-align: center; color: #2d6a4f; margin-bottom: 20px; }
input {
  width: 100%; padding: 12px 14px; margin: 8px 0;
  border-radius: 8px; border: 1px solid #cce3de; font-size: 15px;
}
input:focus { outline: none; border-color: #52b788; }
button {
  width: 100%; padding: 12px; border: none;
  background-color: #40916c; color: white; border-radius: 8px;
  font-size: 16px; cursor: pointer; transition: 0.3s;
}
button:hover { background-color: #2d6a4f; }
p { text-align: center; font-size: 14px; }
a { color: #52b788; text-decoration: none; font-weight: 500; }
a:hover { text-decoration: underline; }
.message { color: red; text-align: center; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
  <h2>Welcome Back 🌿</h2>
  {% for msg in messages %}<p class="message">{{ msg }}</p>{% endfor %}
  <form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <p>Don’t have an account? <a href="{% url 'register' %}">Register</a></p>
</div>
</body>
</html>
